<body>
  <header>
    <div class="ad-slot ad-slot--header" data-ad-slot="header" aria-label="Advertisement"></div>
  </header>

  <main class="tool-layout">
    <div class="tool-content">
      <div id="app-container" class="card">
        
        <!-- Start Screen -->
        <div id="screen-start" class="screen active">
          <h1 class="gradient-title title-serif">你是逐玉裡的誰？</h1>
          <p class="subtitle text-muted">回答 8 道情境題，找出你最像《逐玉》哪位角色！</p>
          <div class="start-cover">
            <img src="https://occ-0-8407-2218.1.nflxso.net/dnm/api/v6/6AYY37jfdO6hpXcMjf9Yu5cnmO0/AAAABUi5o-fxH_RPqFKH2XQZaXkG0Y7Kthlq8ATZ0FMTG_320D-Jcxv6g36PuFlV-eaSHw8l8x76THikwc3HvTqUj3V0ZUuzxqu-Xx_8.jpg?r=f47" alt="測驗封面" class="cover-img" />
          </div>
          <div class="action-buttons mt-6">
            <button id="btn-start" class="btn btn-primary">
              <img src="./assets/icons/icon-start.png" alt="" class="btn-icon" /> 開始測驗
            </button>
          </div>
        </div>

        <!-- Quiz Screen -->
        <div id="screen-quiz" class="screen hidden">
          <div class="quiz-header">
            <div class="progress-bar">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="question-counter text-muted">
              問題 <span id="q-current">1</span> / <span id="q-total">8</span>
            </div>
          </div>
          <div class="question-illustration-wrap">
            <img id="question-illustration" class="question-illustration" alt="題目情境" loading="eager" />
          </div>
          <h2 id="question-text" class="question-text title-serif"></h2>
          <div id="options-container" class="options-container">
            <!-- options here -->
          </div>
        </div>

        <!-- Result Screen -->
        <div id="screen-result" class="screen hidden">
          <h2 class="title-serif text-muted mb-2">你的專屬角色是...</h2>
          <div class="result-portrait-wrap">
            <img id="result-image" class="result-image" alt="角色配對結果" />
          </div>
          <h1 id="result-title" class="result-title gradient-title title-serif"></h1>
          <h3 id="result-archetype" class="result-archetype text-accent"></h3>
          <p id="result-desc" class="result-desc text-muted"></p>
          
          <div class="action-buttons mt-6">
            <button id="btn-share" class="btn btn-primary">
              <img src="./assets/icons/icon-share.png" alt="" class="btn-icon" /> 分享結果
            </button>
            <button id="btn-restart" class="btn btn-secondary">
              <img src="./assets/icons/icon-restart.png" alt="" class="btn-icon" /> 重新測驗
            </button>
          </div>
          <div id="toast" class="toast hidden">結果已複製到剪貼簿！</div>
        </div>

      </div>
    </div>

    <aside class="tool-sidebar">
      <div class="ad-slot ad-slot--sidebar" data-ad-slot="sidebar" aria-label="Advertisement"></div>
    </aside>
  </main>

  <footer>
    <div class="ad-slot ad-slot--footer" data-ad-slot="footer" aria-label="Advertisement"></div>
  </footer>

  <script src="./main.js"></script>
  <script src="./ads/ad-loader.js"></script>
